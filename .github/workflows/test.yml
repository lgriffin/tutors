name: Test Suite

on:
  push:
    branches:
      - main
      - master
      - testing_strategy
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Cache Deno dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Run lint
        working-directory: cli/tutors-gen-lib
        run: deno fmt --check
        continue-on-error: true

      - name: Run unit tests
        working-directory: cli/tutors-gen-lib
        run: deno task test:unit

      - name: Run integration tests
        working-directory: cli/tutors-gen-lib
        run: deno task test:integration

      - name: Run CLI execution tests
        working-directory: cli/tutors-gen-lib
        run: deno task test:cli

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest'
        working-directory: cli/tutors-gen-lib
        run: |
          deno task test:coverage
          deno coverage coverage --lcov > coverage.lcov

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v3
        with:
          files: ./cli/tutors-gen-lib/coverage.lcov
          flags: unittests
          name: tutors-cli-coverage

  summary:
    name: Test Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed on one or more platforms"
            exit 1
          else
            echo "✅ All tests passed on all platforms"
          fi

